name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request: {}

# Cancel superseded PR runs; never cancel an in-flight main/tag publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Build & test (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up Liberica JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: "26"
          cache: maven

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The Tailwind/daisyUI stylesheet is gitignored and built by Bun; some tests
      # (e.g. StaticAssetsTest) serve it, so it must exist before `verify`.
      - name: Build Tailwind + daisyUI CSS
        run: |
          bun install --frozen-lockfile
          bun run css:build
          test -s src/main/resources/META-INF/resources/calit.css

      - name: Build and run tests
        run: ./mvnw --batch-mode --no-transfer-progress verify

  scan:
    name: Vulnerability scan (Trivy fs)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Trivy filesystem scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  build:
    name: Build ${{ matrix.variant }} image (${{ matrix.arch }})
    needs: [test]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      # variant=jvm keeps the original fast-jar image (default tags); variant=native builds the
      # GraalVM image (Dockerfile.native, Alpaquita musl runtime) under -native suffixed tags.
      # Empty suffix => the jvm path is byte-identical to before.
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-latest, platform: linux/amd64, variant: jvm, file: ./Dockerfile, suffix: "" }
          - { arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64, variant: jvm, file: ./Dockerfile, suffix: "" }
          - { arch: amd64, runner: ubuntu-latest, platform: linux/amd64, variant: native, file: ./Dockerfile.native, suffix: "-native" }
          - { arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64, variant: native, file: ./Dockerfile.native, suffix: "-native" }
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Resolve build metadata
        id: buildmeta
        run: |
          echo "version=$(grep -m1 -oP '(?<=<version>)[^<]+' pom.xml)" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore build caches (.m2, bun)
        uses: actions/cache@v5
        with:
          path: |
            var-cache-m2
            var-cache-bun
          key: buildcache-${{ matrix.arch }}${{ matrix.suffix }}-${{ hashFiles('pom.xml', 'bun.lock') }}
          restore-keys: |
            buildcache-${{ matrix.arch }}${{ matrix.suffix }}-

      - name: Inject caches into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: |
            {
              "var-cache-m2": "/root/.m2",
              "var-cache-bun": "/root/.bun/install/cache"
            }
          skip-extraction: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}

      # Build the single-arch image locally (no push) and Trivy-scan it BEFORE any
      # GHCR push. If HIGH/CRITICAL vulns are found this step fails the job and the
      # push-by-digest step below never runs, so a vulnerable image never reaches GHCR.
      # The buildx gha cache makes the subsequent push build a near-no-op.
      - name: Build image locally for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: calit:scan-${{ matrix.arch }}${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.arch }}${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}${{ matrix.suffix }}
          build-args: |
            APP_VERSION=${{ steps.buildmeta.outputs.version }}
            GIT_COMMIT=${{ steps.buildmeta.outputs.commit }}

      - name: Trivy image scan (fail on HIGH/CRITICAL) before push
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: calit:scan-${{ matrix.arch }}${{ matrix.suffix }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # Native-only: boot the just-built image and exercise the paths that fail in native but
      # pass on the JVM (build-heap RNG, BouncyCastle argon2id, Hibernate, Qute render, JSON
      # reflection). Catches reflection/init regressions BEFORE the push. The Google freeBusy
      # path can't be smoked here (needs real OAuth tokens) — it relies on -H:Preserve in
      # Dockerfile.native, which covers those packages by construction.
      - name: Smoke test native image
        if: matrix.variant == 'native'
        run: |
          set -euo pipefail
          IMG=calit:scan-${{ matrix.arch }}${{ matrix.suffix }}
          docker network create smoke
          docker run -d --name pg --network smoke \
            -e POSTGRES_USER=calit -e POSTGRES_PASSWORD=pw -e POSTGRES_DB=calit postgres:16-alpine
          for i in $(seq 1 60); do docker exec pg pg_isready -U calit >/dev/null 2>&1 && break; sleep 1; done
          docker run -d --name app --network smoke -p 8080:8080 \
            -e DB_URL=jdbc:postgresql://pg:5432/calit -e DB_USER=calit -e DB_PASSWORD=pw \
            -e SESSION_ENCRYPTION_KEY=ci-smoke-session-key-0123456789-abcdef \
            -e TOKEN_ENCRYPTION_KEY=1111111111111111111111111111111111111111111111111111111111111111 \
            -e APP_BASE_URL=http://localhost:8080 -e MAIL_HOST=localhost -e QUARKUS_MAILER_MOCK=true \
            -e GOOGLE_OAUTH_CLIENT_ID=dummy -e GOOGLE_OAUTH_CLIENT_SECRET=dummy \
            -e GOOGLE_OAUTH_STATE_SECRET=ci-smoke-state-secret-0123456789-abcd \
            "$IMG"
          ready=""
          for i in $(seq 1 120); do
            if curl -fs http://localhost:8080/q/health/ready >/dev/null 2>&1; then ready=1; break; fi
            docker ps -q -f name=app -f status=running | grep -q . || { echo "::error::app container exited during boot"; break; }
            sleep 1
          done
          if [ -z "$ready" ]; then echo "::error::native image did not become ready"; docker logs app; exit 1; fi
          # /setup render (Qute) + create admin (argon2id / BouncyCastle native path) with CSRF.
          csrf=$(curl -s -c /tmp/cj http://localhost:8080/setup | grep -oP 'name="csrf-token"[^>]*value="\K[^"]+' | head -1)
          code=$(curl -s -b /tmp/cj -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/setup \
            --data-urlencode "username=admin" --data-urlencode "email=a@b.co" \
            --data-urlencode "password=hunter2hunter2" --data-urlencode "csrf-token=$csrf")
          echo "/setup POST -> $code"
          [ "$code" = "302" ] || { echo "::error::/setup (argon2id) returned $code, expected 302"; docker logs app; exit 1; }
          # Fail on reflection/init errors even if a request happened to return non-fatally.
          if docker logs app 2>&1 | grep -iE 'NoSuchMethodException|InstantiationException|no accessible default constructor|UnsupportedFeatureException'; then
            echo "::error::native reflection/init error in logs"; exit 1
          fi
          echo "native smoke test passed"
          docker rm -f app pg >/dev/null 2>&1 || true

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.arch }}${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}${{ matrix.suffix }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            APP_VERSION=${{ steps.buildmeta.outputs.version }}
            GIT_COMMIT=${{ steps.buildmeta.outputs.commit }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: jvm, suffix: "" }
          - { variant: native, suffix: "-native" }
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # Empty suffix for jvm (tags unchanged); "-native" for the GraalVM variant
          # => edge-native, 1.10.0-native, 1.10-native, sha-<sha>-native.
          # onlatest=true makes the auto ":latest" tag (emitted on semver git tags) carry the
          # suffix too: jvm => :latest, native => :latest-native. Without it both variants would
          # push a bare ":latest" and race/clobber each other.
          flavor: suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}"

  release:
    name: Create GitHub Release
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for generated release notes

      - name: Verify tag matches pom version
        run: |
          # First <version> in pom.xml is the project version (no <parent> block).
          POM_VERSION=$(grep -m1 -oP '(?<=<version>)[^<]+' pom.xml)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$POM_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pom version $POM_VERSION"
            exit 1
          fi

      - name: Create release with generated notes
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
