# Renovate (renovate.json) drives routine version bumps for this repo.
# Dependabot is configured here primarily so GitHub security alerts and
# automated security update PRs are enabled for Maven, GitHub Actions, and Docker.
version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
