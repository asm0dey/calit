sonar.projectKey=asm0dey_calit
sonar.organization=asm0dey

# Flyway migrations are PostgreSQL, but Sonar analyses .sql with its Oracle PL/SQL
# engine, which flags VARCHAR and suggests the Oracle-only VARCHAR2. VARCHAR is correct
# (and VARCHAR2 does not exist) in Postgres, so silence that wrong-dialect rule on the
# migration scripts only — every other SQL rule still applies.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:VarcharUsageCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=**/db/migration/*.sql

# S135 ("at most one break/continue per loop") is a stylistic rule we don't follow:
# early-continue guard clauses are clearer than the nested alternative. Disable it.
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S135
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.java

# _location.html is a Qute fragment always {#include}'d INSIDE a parent <ul> (see
# requested/confirmation/reschedule/... templates). Sonar's HTML checker analyses the
# fragment in isolation and cannot follow the include, so it wrongly reports the <li>
# as lacking a container. False positive — silence it on this fragment only.
sonar.issue.ignore.multicriteria.e3.ruleKey=Web:ItemTagNotWithinContainerTagCheck
sonar.issue.ignore.multicriteria.e3.resourceKey=**/templates/email/_location.html

# S107 ("too many parameters"): the EmailService @CheckedTemplate native methods mirror
# their template's variables 1:1 by design — flat typed params were chosen over a view
# record on purpose (see docs/superpowers/specs/2026-07-02-typed-email-templates-design.md),
# so a high param count IS the intended, build-validated contract. Silence it here only.
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S107
sonar.issue.ignore.multicriteria.e4.resourceKey=**/email/EmailService.java

# The email templates each declare the variables they use as type-safe {@...} params for
# @CheckedTemplate validation. The shared subset (meetingTypeName, startTime, ...) repeats
# verbatim across templates by necessity — Qute has no cross-template decl sharing — so
# Sonar's copy/paste detector reads inherent, correct type declarations as duplication.
# Exclude the email templates from duplication detection (not from any other analysis).
sonar.cpd.exclusions=**/templates/email/*.html
