{@java.lang.String title}
<!DOCTYPE html>
<html lang="{lang}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{title}</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/calit.css">
  <script>
    /* Apply saved theme before paint to avoid a flash. */
    (function () {
      try {
        var t = localStorage.getItem('calit-theme');
        if (t) { document.documentElement.setAttribute('data-theme', t); }
      } catch (e) {}
    })();
  </script>
  {#if inject:site.googleVerification}
  <meta name="google-site-verification" content="{inject:site.googleVerification}">
  {/if}
  {#insert head}{/insert}
</head>
<body class="canvas {bodyClass ?: ''} bg-base-200 text-base-content min-h-screen">
  <div class="fixed top-3 right-3 z-50">
    <label class="swap swap-rotate btn btn-ghost btn-circle btn-sm" title="Toggle theme" aria-label="Toggle theme">
      <input type="checkbox" class="theme-controller" value="calit-dark" id="calit-theme-toggle">
      <svg class="swap-off h-5 w-5 fill-current" viewBox="0 0 24 24"><path d="M5.64 17l-.71.71a1 1 0 0 0 1.41 1.41l.71-.71A1 1 0 0 0 5.64 17M5 12a1 1 0 0 0-1-1H3a1 1 0 0 0 0 2h1a1 1 0 0 0 1-1m7-7a1 1 0 0 0 1-1V3a1 1 0 0 0-2 0v1a1 1 0 0 0 1 1M5.64 7.05a1 1 0 0 0 .7.29 1 1 0 0 0 .71-.29 1 1 0 0 0 0-1.41l-.71-.71a1 1 0 0 0-1.41 1.41zM17 5.64a1 1 0 0 0 .7-.29l.71-.71a1 1 0 1 0-1.41-1.41l-.71.71A1 1 0 0 0 17 5.64M21 11h-1a1 1 0 0 0 0 2h1a1 1 0 0 0 0-2m-9 8a1 1 0 0 0-1 1v1a1 1 0 0 0 2 0v-1a1 1 0 0 0-1-1m6.36-2a1 1 0 0 0-1.41 1.41l.71.71a1 1 0 0 0 1.41-1.41zM12 6.5A5.5 5.5 0 1 0 17.5 12 5.51 5.51 0 0 0 12 6.5"/></svg>
      <svg class="swap-on h-5 w-5 fill-current" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-4.4 2.26 5.4 5.4 0 0 1-5.4-5.4c0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1"/></svg>
    </label>
  </div>
  <main class="container py-8">
    {#insert}{/insert}
  </main>
  <!-- CALIT_BUILD_FOOTER -->
  <footer class="container py-6 text-center text-xs text-base-content/50">
    <a href="https://github.com/asm0dey/calit" class="link link-hover">calit</a>
    {inject:build.version} &middot; {inject:build.commit}
    <nav class="mt-2" aria-label="{msg:common_language}">
      {#for o in localeOptions}
        {#if o_index > 0}<span class="mx-1">&middot;</span>{/if}
        {#if o.active}
          <span class="font-semibold" aria-current="true">{o.label}</span>
        {#else}
          <a class="link link-hover" href="{o.href}">{o.label}</a>
        {/if}
      {/for}
    </nav>
  </footer>
  <script>
    /* Persist the manual theme choice; default (no attr) falls back to OS via prefersdark. */
    (function () {
      var cb = document.getElementById('calit-theme-toggle');
      if (!cb) { return; }
      var saved = null;
      try { saved = localStorage.getItem('calit-theme'); } catch (e) {}
      /* No stored choice → follow OS so the icon matches the rendered theme. */
      cb.checked = saved !== null ? saved === 'calit-dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      cb.addEventListener('change', function () {
        var t = cb.checked ? 'calit-dark' : 'calit-light';
        document.documentElement.setAttribute('data-theme', t);
        try { localStorage.setItem('calit-theme', t); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
