{@java.lang.String title}
{@java.lang.String error}
{@java.lang.String lang}
<!DOCTYPE html>
<html lang="{lang}" dir="{#if lang == 'he'}rtl{#else}ltr{/if}" data-theme="calit-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{title}</title>
  <link rel="stylesheet" href="/calit.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
  <form method="post" action="/signup" class="fieldset bg-base-100 border border-base-300 rounded-box p-6 w-full max-w-sm">
    <input type="hidden" name="{inject:csrf.parameterName}" value="{inject:csrf.token}">
    <h1 class="text-xl font-bold mb-2">{msg:auth_signup_h1}</h1>
    {#if error}
    <div class="alert alert-error mb-2"><span>{error}</span></div>
    {/if}
    <label class="label" for="username">{msg:auth_signup_username_label}</label>
    <input id="username" class="input w-full" type="text" name="username" required autofocus>
    <label class="label" for="password">{msg:auth_signup_password_label}</label>
    <input id="password" class="input w-full" type="password" name="password" required>
    <button type="submit" class="btn btn-primary mt-3">{msg:auth_signup_submit}</button>
    <a href="/login" class="link link-hover text-sm mt-2">{msg:auth_signup_login_link}</a>
  </form>
</body>
</html>
