{@java.lang.String username}
{@java.lang.String token}
{@java.lang.String lang}
<!DOCTYPE html>
<html lang="{lang}" dir="{#if lang == 'he'}rtl{#else}ltr{/if}" data-theme="calit-light">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>{msg:auth_bridge_title}</title>
  <link rel="stylesheet" href="/calit.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
  <!-- Bridges the verified Google identity into a native form-auth session: this posts the
       single-use login ticket to /j_security_check, which mints the quarkus-credential cookie. -->
  <form id="bridge" method="post" action="/j_security_check" autocomplete="off">
    <input type="hidden" name="j_username" value="{username}">
    <input type="hidden" name="j_password" value="{token}">
    <noscript>
      <button type="submit" class="btn btn-primary">{msg:auth_bridge_noscript_btn}</button>
    </noscript>
  </form>
  <p class="text-base-content/70">{msg:auth_bridge_progress}</p>
  <script>document.getElementById('bridge').submit();</script>
</body>
</html>
