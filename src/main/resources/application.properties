# Dev Services auto-provisions Postgres in dev/test (Docker required) when no JDBC URL is set.
quarkus.datasource.db-kind=postgresql
# Flyway owns the schema; Hibernate never generates or validates it (the old
# `database.generation` key was deprecated in Quarkus 3.x in favor of this one).
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.sql=true
quarkus.flyway.migrate-at-start=true

# Production: real datasource via env vars (12-factor; no node-local config).
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/calit}
%prod.quarkus.datasource.username=${DB_USER:calit}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# --- Google OAuth (Plan 2) ---
# All env-driven; never commit real secrets. Empty defaults keep the app booting without Google configured.
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
# @ConfigMapping rejects empty strings; supply non-empty test-only placeholders so the app boots in tests
# without real Google credentials. These values are never used for actual OAuth calls.
%test.google.oauth.client-id=test-client-id
%test.google.oauth.client-secret=test-client-secret
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/google/callback}
# Comma-free scope; calendar read/write + freebusy.
google.oauth.scope=https://www.googleapis.com/auth/calendar
# CSRF state signing key. Stateless across replicas: every replica must share this secret so any
# replica can mint the state at /connect and any (other) replica can verify it at /callback without
# server-side session. Set a strong random value in %prod via env.
google.oauth.state-secret=${GOOGLE_OAUTH_STATE_SECRET:dev-only-insecure-state-secret-change-me}
# Application name sent to the Google Calendar client.
google.application-name=calit

# Quarkus 3.x: JSONB column mapping uses hibernate's own JSON mapper (not the REST ObjectMapper).
# Without this, Quarkus rejects @JdbcTypeCode(SqlTypes.JSON) fields when write-dates-as-timestamps=false.
quarkus.hibernate-orm.mapping.format.global=ignore

# Abuse guards. Disabled by default for local dev/tests; enabled in prod via env.
# IMPORTANT: the SAME TURNSTILE_ENABLED env var drives both the server-side verifier (here) and
# the booking-form widget (calit.turnstile.* below), so enabling Turnstile turns on widget AND
# verification together — never a rendered widget whose token is never checked. TURNSTILE_SECRET_KEY
# is the server-side secret (never rendered); TURNSTILE_SITE_KEY (below) is the public widget key.
calit.abuse.turnstile.enabled=${TURNSTILE_ENABLED:false}
calit.abuse.turnstile.secret=${TURNSTILE_SECRET_KEY:}
calit.abuse.turnstile.verify-url=https://challenges.cloudflare.com/turnstile/v0/siteverify
calit.abuse.per-email-daily-cap=${PER_EMAIL_DAILY_CAP:10}

# --- Mailer (Plan 4) ---
# Default "from" address for all outgoing mail.
quarkus.mailer.from=${MAIL_FROM:calit@example.com}

# Public origin used to build invitee manage links in emails.
app.base-url=${APP_BASE_URL:http://localhost:8080}

# In dev & test the mock mailbox captures mail instead of hitting SMTP.
%dev.quarkus.mailer.mock=true
%test.quarkus.mailer.mock=true

# Production SMTP — all values via env.
%prod.quarkus.mailer.mock=false
%prod.quarkus.mailer.from=${MAIL_FROM}
%prod.quarkus.mailer.host=${MAIL_HOST}
%prod.quarkus.mailer.port=${MAIL_PORT:587}
%prod.quarkus.mailer.username=${MAIL_USERNAME}
%prod.quarkus.mailer.password=${MAIL_PASSWORD}
%prod.quarkus.mailer.start-tls=${MAIL_START_TLS:REQUIRED}
%prod.app.base-url=${APP_BASE_URL}

# --- Admin auth (single configured owner; env-driven) ---
# Form-based login (encrypted cookie, no server session — works across stateless replicas).
quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.login-page=/login
quarkus.http.auth.form.error-page=/login?error=true
quarkus.http.auth.form.landing-page=/admin
quarkus.http.auth.form.http-only-cookie=true
quarkus.http.auth.form.cookie-same-site=lax
# In production the app must be behind HTTPS — mark the login cookie Secure there.
%prod.quarkus.http.auth.form.cookie-secure=true
# Encrypts the credential cookie (>=16 chars). Prod MUST set SESSION_ENCRYPTION_KEY; same value on every replica.
quarkus.http.auth.session.encryption-key=${SESSION_ENCRYPTION_KEY:dev-only-insecure-session-key-change-me-0123456789}
%prod.quarkus.http.auth.session.encryption-key=${SESSION_ENCRYPTION_KEY}
# Only /admin/* requires the admin role; everything else stays public.
quarkus.http.auth.permission.admin.paths=/admin,/admin/*
quarkus.http.auth.permission.admin.policy=admin-policy
quarkus.http.auth.policy.admin-policy.roles-allowed=admin

# Public paths are open by default (no permission entry needed).

# --- Cloudflare Turnstile (owner-configurable abuse protection on the booking form) ---
# When calit.turnstile.enabled=false the widget + script are skipped entirely (Plan 3 then
# treats verification as a no-op). The site key is public (rendered into the page); the
# secret key lives only in Plan 3's server-side verifier and is NEVER rendered.
calit.turnstile.enabled=${TURNSTILE_ENABLED:false}
calit.turnstile.site-key=${TURNSTILE_SITE_KEY:}

# --- Reminder lead time (feature 15) ---
# Minutes before a booking's start that the reminder fires. Single source of truth: read by BOTH
# the Plan 6 ReminderScheduler (when reminders actually fire) and the admin settings display.
# Override per deployment via REMINDER_LEAD_MINUTES. Default 24h.
calit.reminder.lead-minutes=${REMINDER_LEAD_MINUTES:1440}

# Feature 14: how long a PENDING (approval-required) booking is held before auto-decline.
calit.approval.hold-hours=${APPROVAL_HOLD_HOURS:24}

# Disable the scheduler timers in tests so the 60s auto-tick never races the
# direct-call scheduler tests (which invoke dispatchDueReminders/expirePendingBookings
# directly). Plan 6 deviation: prevents flaky mid-test row claims by the background tick.
%test.quarkus.scheduler.enabled=false
