# Dev Services auto-provisions Postgres in dev/test (Docker required) when no JDBC URL is set.
quarkus.datasource.db-kind=postgresql
# Flyway owns the schema; Hibernate never generates or validates it (the old
# `database.generation` key was deprecated in Quarkus 3.x in favor of this one).
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=false
quarkus.flyway.migrate-at-start=true

# Production: real datasource via env vars (12-factor; no node-local config).
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/calit}
%prod.quarkus.datasource.username=${DB_USER:calit}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# --- Google OAuth (Plan 2) ---
# All env-driven; never commit real secrets. Empty defaults keep the app booting without Google configured.
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
# @ConfigMapping rejects empty strings; supply non-empty test-only placeholders so the app boots in tests
# without real Google credentials. These values are never used for actual OAuth calls.
%test.google.oauth.client-id=test-client-id
%test.google.oauth.client-secret=test-client-secret
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/google/callback}
# Comma-free scope; calendar read/write + freebusy.
google.oauth.scope=https://www.googleapis.com/auth/calendar
# CSRF state signing key. Stateless across replicas: every replica must share this secret so any
# replica can mint the state at /connect and any (other) replica can verify it at /callback without
# server-side session. Set a strong random value in %prod via env.
google.oauth.state-secret=${GOOGLE_OAUTH_STATE_SECRET:dev-only-insecure-state-secret-change-me}
# Application name sent to the Google Calendar client.
google.application-name=calit

# Quarkus 3.x: JSONB column mapping uses hibernate's own JSON mapper (not the REST ObjectMapper).
# Without this, Quarkus rejects @JdbcTypeCode(SqlTypes.JSON) fields when write-dates-as-timestamps=false.
quarkus.hibernate-orm.mapping.format.global=ignore

# Abuse guards. Disabled by default for local dev/tests; enabled in %prod via env.
calit.abuse.turnstile.enabled=false
calit.abuse.turnstile.secret=
calit.abuse.turnstile.verify-url=https://challenges.cloudflare.com/turnstile/v0/siteverify
calit.abuse.per-email-daily-cap=10
