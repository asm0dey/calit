pub_landing_cap_landing_pre=Jeder Nutzer erhält
pub_landing_cap_landing_post=seine eigenen aktiven Termintypen, sonst nichts.
pub_landing_cap_confirmed_title=In einem Klick bestätigt
pub_landing_cap_confirmed_desc=Gäste wählen einen Slot in ihrer eigenen Zeitzone; beide Seiten erhalten eine E-Mail und einen Meet-Link.
pub_landing_features_eyebrow=Warum calit
pub_landing_features_h2=Zum Betreiben gebaut, nicht zum Mieten.
pub_landing_features_lede=Alles, was Sie von einem Planungstool erwarten — plus echte Mandantenfähigkeit und die Gewissheit, Ihre Daten zu besitzen.
pub_landing_feat_isolation_k=Isolation
pub_landing_feat_isolation_h3=Benutzerbezogene Mandantenfähigkeit
pub_landing_feat_isolation_p=Jeder Termintyp, jede Buchung und jede Einstellung hat einen Besitzer. Ein Nutzer kann niemals die Daten eines anderen sehen oder ändern.
pub_landing_feat_calendar_k=Kalender
pub_landing_feat_calendar_h3=Google-Sync & Meet
pub_landing_feat_calendar_p=Verbinden Sie das eigene Google-Konto jedes Nutzers. Buchungen erstellen Ereignisse und generieren automatisch einen Meet-Link — oder laufen vollständig ohne Google.
pub_landing_feat_control_k=Kontrolle
pub_landing_feat_control_h3=Genehmigungen & Limits
pub_landing_feat_control_p=Halten Sie Termine als ausstehend, bis sie genehmigt sind, mit typbezogenen Puffern, Mindestvorlaufzeiten und einem Buchungshorizont.
pub_landing_feat_trust_k=Vertrauen
pub_landing_feat_trust_h3=Echte Authentifizierung
pub_landing_feat_trust_p=Passwörter mit argon2id gehashed, zustandslose verschlüsselte Cookies, sofortige Sperrung — kein eingebettetes Admin-Passwort.
pub_landing_feat_defense_k=Schutz
pub_landing_feat_defense_h3=Missbrauchsschutz
pub_landing_feat_defense_p=Cloudflare Turnstile, ein Honeypot und ein tägliches E-Mail-Limit schützen jedes öffentliche Buchungsformular von Anfang an.
pub_landing_feat_ops_k=Betrieb
pub_landing_feat_ops_h3=Ein Binary + Postgres
pub_landing_feat_ops_p=Eine einzelne Quarkus-App und eine Datenbank. Überall selbst hosten, Ihr Team einladen, fertig. Optionale öffentliche Registrierung auch dabei.
pub_landing_close_eyebrow=Loslegen
pub_landing_close_h2=In wenigen Minuten aufsetzen.
pub_landing_close_p=Auf eine Postgres-Datenbank zeigen und die Seite öffnen — beim ersten Besuch wird Ihr Admin-Konto erstellt. Keine Lizenz, keine Warteliste, kein Sitzkalkül.
pub_landing_close_cta_dashboard=Ihr Dashboard öffnen
pub_landing_close_cta_features=Funktionen entdecken
