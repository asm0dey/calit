pub_landing_feat_ops_h3=Ein Binary + Postgres
pub_landing_feat_ops_p=Eine einzelne Quarkus-App und eine Datenbank. Überall selbst hosten, Ihr Team einladen, fertig. Optionale öffentliche Registrierung auch dabei.
