pub_landing_cap_console_title=Die Verwaltungskonsole
pub_landing_cap_console_desc_pre=Verwalten Sie Termintypen, Verfügbarkeit, Buchungsfelder, Google-Synchronisierung und — für Admins — alle Nutzer des Teams unter
